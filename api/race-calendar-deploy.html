<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #F7F3EC; }
    #root { min-height: 100vh; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, createContext, useContext } = React;

    // =============================================================
    // Icons
    // =============================================================

    const Smile = ({ size = 24, strokeWidth = 1.75, ...props }) => (
      <svg {...props} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
        <line x1="9" y1="9" x2="9.01" y2="9" />
        <line x1="15" y1="9" x2="15.01" y2="9" />
      </svg>
    );

    const Disc3 = ({ size = 24, strokeWidth = 1.75, ...props }) => (
      <svg {...props} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" />
        <circle cx="12" cy="12" r="1" />
        <path d="M6 12c0-1.7.7-3.2 1.8-4.2" />
        <circle cx="12" cy="12" r="4" />
        <path d="m15.2 15.2 2.1 2.1" />
      </svg>
    );

    // =============================================================
    // Client-side identity + local prefs (localStorage)
    // =============================================================

    const USER_ID_KEY = "race-calendar-user-id";
    const SHARE_ID_KEY = "race-calendar-share-id";
    const THEME_KEY = "race-calendar-theme";

    function randomId(length = 20) {
      const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
      let id = "";
      try {
        const bytes = new Uint8Array(length);
        crypto.getRandomValues(bytes);
        for (let i = 0; i < length; i++) id += chars[bytes[i] % chars.length];
      } catch {
        for (let i = 0; i < length; i++) id += chars[Math.floor(Math.random() * chars.length)];
      }
      return id;
    }

    function getUserId() {
      try {
        let id = localStorage.getItem(USER_ID_KEY);
        if (!id) { id = randomId(20); localStorage.setItem(USER_ID_KEY, id); }
        return id;
      } catch { return "anon-" + Date.now(); }
    }

    const localPrefs = {
      getTheme() { try { return localStorage.getItem(THEME_KEY); } catch { return null; } },
      setTheme(v) { try { localStorage.setItem(THEME_KEY, v); } catch {} },
      getShareId() { try { return localStorage.getItem(SHARE_ID_KEY); } catch { return null; } },
      setShareId(v) { try { v ? localStorage.setItem(SHARE_ID_KEY, v) : localStorage.removeItem(SHARE_ID_KEY); } catch {} },
    };

    // =============================================================
    // Backend API
    // =============================================================

    async function apiGetUser() {
      const res = await fetch(`/api/user?id=${encodeURIComponent(getUserId())}`);
      if (!res.ok) throw new Error(`GET user ${res.status}`);
      const data = await res.json();
      return data.items || [];
    }

    async function apiSaveUser(items) {
      const res = await fetch(`/api/user?id=${encodeURIComponent(getUserId())}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(items),
      });
      if (!res.ok) throw new Error(`POST user ${res.status}`);
    }

    async function apiGetShare(shareId) {
      const res = await fetch(`/api/share?id=${encodeURIComponent(shareId)}`);
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`GET share ${res.status}`);
      const data = await res.json();
      return data.items;
    }

    async function apiSaveShare(items, existingId = null) {
      const res = await fetch(`/api/share`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items, existingId }),
      });
      if (!res.ok) throw new Error(`POST share ${res.status}`);
      const data = await res.json();
      return data.shareId;
    }

    async function apiDeleteShare(shareId) {
      try { await fetch(`/api/share?id=${encodeURIComponent(shareId)}`, { method: "DELETE" }); } catch {}
    }

    // =============================================================
    // URL helpers
    // =============================================================

    function getShareIdFromURL() {
      try {
        const hash = window.location.hash || "";
        const match = hash.match(/share=([a-zA-Z0-9_-]+)/);
        return match ? match[1] : null;
      } catch { return null; }
    }

    function buildShareURL(shareId) {
      try {
        const base = (window.location.href || "").split("#")[0];
        return `${base}#share=${shareId}`;
      } catch { return `#share=${shareId}`; }
    }

    function clearURLHash() {
      try {
        const base = window.location.href.split("#")[0];
        window.history.replaceState(null, "", base);
      } catch {}
    }

    // =============================================================
    // Constants
    // =============================================================

    const TYPES = {
      marathon: { label: "Marathon", color: "#534AB7" },
      half: { label: "Half", color: "#1D9E75" },
      fivek: { label: "5K", color: "#D85A30" },
      track: { label: "Track / mile", color: "#378ADD" },
      trail: { label: "Trail", color: "#639922" },
      ultra: { label: "Ultra", color: "#7C2D12" },
      relay: { label: "Relay", color: "#BE185D" },
      fun: { label: "Fun run", color: "#D4537E" },
      unsanctioned: { label: "Unsanctioned", color: "#BA7517" },
    };
    const STATUSES = {
      confirmed: { label: "Confirmed", bg: "#E1F5EE", fg: "#085041" },
      goal: { label: "Primary goal", bg: "#EEEDFE", fg: "#3C3489" },
      hopeful: { label: "Hopeful", bg: "#FAEEDA", fg: "#633806" },
      conditional: { label: "Conditional", bg: "#F1EFE8", fg: "#444441" },
      option: { label: "Option", bg: "#F1EFE8", fg: "#444441" },
      tba: { label: "Date TBD", bg: "#F1EFE8", fg: "#5F5E5A" },
      maybe: { label: "Maybe", bg: "#F1EFE8", fg: "#888780" },
      completed: { label: "Completed", bg: "#DCEFDE", fg: "#1F5C2D" },
      cancelled: { label: "Postponed / cancelled", bg: "#F4E4E4", fg: "#7F1D1D" },
    };
    const EVENT_CATEGORIES = {
      vacation: { label: "Vacation", color: "#0E7490" },
      wedding: { label: "Wedding", color: "#9D174D" },
      travel: { label: "Work travel", color: "#6D28D9" },
      family: { label: "Family", color: "#B91C1C" },
      injury: { label: "Injury / recovery", color: "#57534E" },
      other: { label: "Other", color: "#737373" },
    };
    const BIG_TYPES = ["marathon", "half", "trail", "relay", "ultra"];
    const INACTIVE_STATUSES = ["cancelled", "completed"];
    const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const MONTH_CUMULATIVE = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];

    const THEMES = {
      paper: {
        name: "paper", label: "Paper",
        paper: "#F7F3EC", ink: "#1C1917", inkMuted: "#6B655C",
        border: "#E5DFD3", surface: "#FFFFFF",
        eventSurface: "#F3EBD9", eventBorder: "#E0D3B1",
        accent: "#C2410C", dangerBg: "#991B1B",
        backdrop: "rgba(28, 25, 23, 0.35)",
        warningBg: "#FDF6E3", warningBorder: "#F0D999",
        warningIconBg: "#B45309", warningIconColor: "#FDF6E3",
        warningText: "#633806",
        errorBg: "#F4E4E4", errorText: "#7F1D1D",
        shareBannerBg: "#EEEDFE", shareBannerBorder: "#C7C3F0", shareBannerText: "#3C3489",
        fontDisplay: '"Fraunces", serif', fontBody: '"DM Sans", sans-serif', fontMono: '"JetBrains Mono", monospace',
        displayWeight: 400, bodyWeight: 400, mediumWeight: 500,
        radius: 8, radiusSmall: 6, radiusBadge: 4, radiusPill: 16,
        uppercaseHeadings: false, italicAccents: true,
        backgroundPattern: "none", badgeStyle: "soft",
        cardBorderWidth: 1, letterSpacingDisplay: "-0.02em",
      },
      rave: {
        name: "rave", label: "Rave",
        paper: "#0A0A0A", ink: "#FFFFFF", inkMuted: "#8A8A8A",
        border: "#FFFFFF", surface: "#141414",
        eventSurface: "#1A1A1A", eventBorder: "#2E2E2E",
        accent: "#FF1744", dangerBg: "#FF1744",
        backdrop: "rgba(0, 0, 0, 0.78)",
        warningBg: "#1A0A0A", warningBorder: "#FF1744",
        warningIconBg: "#FF1744", warningIconColor: "#FFFFFF",
        warningText: "#FF6B8A",
        errorBg: "#2A0A0A", errorText: "#FF6B8A",
        shareBannerBg: "#0A0A0A", shareBannerBorder: "#FF1744", shareBannerText: "#FFFFFF",
        fontDisplay: '"Anton", sans-serif', fontBody: '"Space Mono", monospace', fontMono: '"Space Mono", monospace',
        displayWeight: 400, bodyWeight: 400, mediumWeight: 700,
        radius: 0, radiusSmall: 0, radiusBadge: 0, radiusPill: 0,
        uppercaseHeadings: true, italicAccents: false,
        backgroundPattern: "radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px)",
        badgeStyle: "solid",
        cardBorderWidth: 1, letterSpacingDisplay: "0.01em",
      },
    };

    const ThemeContext = createContext(THEMES.paper);
    const useTheme = () => useContext(ThemeContext);

    // =============================================================
    // Helpers
    // =============================================================

    function normalizeItem(item) { return { ...item, kind: item.kind || "race" }; }
    function isRace(item) { return (item.kind || "race") === "race"; }
    function isEvent(item) { return item.kind === "event"; }
    function raceTypes(race) {
      if (Array.isArray(race.types)) return race.types;
      if (race.type) return [race.type];
      return [];
    }
    function dayOfYear(dateStr) {
      const [, m, d] = dateStr.split("-").map(Number);
      return MONTH_CUMULATIVE[m - 1] + d;
    }
    function getYear(dateStr) { return parseInt(dateStr.substring(0, 4), 10); }
    function formatDayMonth(dateStr) {
      const [, m, d] = dateStr.split("-").map(Number);
      return { day: d, month: MONTH_NAMES[m - 1] };
    }
    function formatDateRange(dateStr, endDateStr) {
      const start = formatDayMonth(dateStr);
      if (!endDateStr || endDateStr === dateStr) return { mode: "single", primary: String(start.day), secondary: start.month };
      const end = formatDayMonth(endDateStr);
      if (start.month === end.month) return { mode: "range", primary: `${start.day}–${end.day}`, secondary: start.month };
      return { mode: "crossMonth", startLabel: `${start.month} ${start.day}`, endLabel: `${end.month} ${end.day}` };
    }
    function calculateDuration(dateStr, endDateStr) {
      if (!endDateStr || endDateStr === dateStr) return 1;
      return Math.round((new Date(endDateStr) - new Date(dateStr)) / 86400000) + 1;
    }
    function monthKey(dateStr) {
      const [y, m] = dateStr.split("-").map(Number);
      return `${y}-${String(m).padStart(2, "0")}`;
    }
    function monthLabel(key) {
      const [y, m] = key.split("-").map(Number);
      return `${MONTH_NAMES[m - 1]} ${y}`;
    }
    function detectRaceConflicts(items) {
      const active = items.filter((i) => isRace(i) && !INACTIVE_STATUSES.includes(i.status));
      const sorted = [...active].sort((a, b) => a.date.localeCompare(b.date));
      const warnings = [];
      for (let i = 0; i < sorted.length - 1; i++) {
        const a = sorted[i]; const b = sorted[i + 1];
        if (a.optionGroup && a.optionGroup === b.optionGroup) continue;
        const aEnd = a.endDate || a.date;
        const diffDays = Math.round((new Date(b.date) - new Date(aEnd)) / 86400000);
        const aBig = raceTypes(a).some((t) => BIG_TYPES.includes(t));
        const bBig = raceTypes(b).some((t) => BIG_TYPES.includes(t));
        if (diffDays <= 14 && (aBig || bBig) && getYear(a.date) === getYear(b.date)) {
          warnings.push({ before: b.id, days: diffDays, a, b });
        }
      }
      return warnings;
    }
    function detectEventOverlaps(items) {
      const races = items.filter((i) => isRace(i) && !INACTIVE_STATUSES.includes(i.status));
      const events = items.filter(isEvent);
      const warnings = [];
      for (const race of races) {
        const raceStart = race.date; const raceEnd = race.endDate || race.date;
        for (const event of events) {
          const evStart = event.date; const evEnd = event.endDate || event.date;
          if (raceStart <= evEnd && raceEnd >= evStart) warnings.push({ race, event });
        }
      }
      return warnings;
    }

    // =============================================================
    // Form primitives
    // =============================================================

    function FormShell({ title, subtitle, children, onCancel, maxWidth = 520 }) {
      const theme = useTheme();
      return (
        <div style={{ position: "fixed", inset: 0, background: theme.backdrop, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px 16px", zIndex: 100, overflowY: "auto" }}
          onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
          <div style={{ background: theme.paper, borderRadius: theme.radius, padding: "24px 28px 20px", width: "100%", maxWidth, border: `${theme.cardBorderWidth}px solid ${theme.border}`, boxShadow: theme.name === "rave" ? "0 20px 50px rgba(0,0,0,0.6)" : "0 20px 50px rgba(28,25,23,0.12)" }}>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: theme.fontDisplay, fontSize: theme.name === "rave" ? 28 : 22, fontWeight: theme.name === "rave" ? 400 : theme.mediumWeight, color: theme.ink, lineHeight: 1, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.01em" : "normal" }}>{title}</div>
              <div style={{ fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontBody, fontStyle: theme.italicAccents ? "italic" : "normal", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal", fontSize: 13, color: theme.inkMuted, marginTop: 4 }}>{subtitle}</div>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function FormFooter({ isNew, onSave, onCancel, onDelete, confirmDelete, setConfirmDelete, itemId }) {
      const theme = useTheme();
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 22, paddingTop: 16, borderTop: `1px solid ${theme.border}`, gap: 12, flexWrap: "wrap" }}>
          <div>
            {!isNew && onDelete && (confirmDelete ? (
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12, color: theme.dangerBg, fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontBody, fontStyle: theme.italicAccents ? "italic" : "normal", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal" }}>Delete?</span>
                <button onClick={() => onDelete(itemId)} style={{ padding: "6px 12px", background: theme.dangerBg, color: theme.name === "rave" ? "#000000" : theme.paper, border: "none", borderRadius: theme.radiusSmall, fontSize: 12, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }}>Yes, delete</button>
                <button onClick={() => setConfirmDelete(false)} style={{ background: "transparent", border: "none", color: theme.inkMuted, fontSize: 12, cursor: "pointer", fontFamily: theme.fontBody, padding: "6px 0" }}>Cancel</button>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} style={{ background: "transparent", border: "none", color: theme.dangerBg, fontSize: 13, cursor: "pointer", padding: "6px 0", fontFamily: theme.fontBody, fontWeight: theme.mediumWeight, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }}>Delete</button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onCancel} style={{ padding: "9px 16px", background: "transparent", color: theme.inkMuted, border: `1px solid ${theme.border}`, borderRadius: theme.radiusSmall, fontSize: 13, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }}>Cancel</button>
            <button onClick={onSave} style={{ padding: "9px 18px", background: theme.ink, color: theme.paper, border: "none", borderRadius: theme.radiusSmall, fontSize: 13, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }}>Save</button>
          </div>
        </div>
      );
    }

    function Field({ label, hint, children }) {
      const theme = useTheme();
      return (
        <div>
          <label style={{ fontSize: 11, fontWeight: theme.mediumWeight, color: theme.inkMuted, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 6, display: "block", fontFamily: theme.fontBody }}>{label}</label>
          {children}
          {hint && <div style={{ fontSize: 11, color: theme.inkMuted, marginTop: 4, fontStyle: theme.italicAccents ? "italic" : "normal", fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal" }}>{hint}</div>}
        </div>
      );
    }
    const TwoCol = ({ children }) => <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>{children}</div>;

    function useInputStyle() {
      const theme = useTheme();
      return { width: "100%", padding: "9px 11px", border: `1px solid ${theme.border}`, borderRadius: theme.radiusSmall, fontFamily: theme.fontBody, fontSize: 14, background: theme.surface, color: theme.ink, outline: "none", boxSizing: "border-box" };
    }
    function Input({ value, onChange, type = "text", placeholder, min, readOnly, onClick, id }) {
      const style = useInputStyle(); const theme = useTheme();
      return <input id={id} type={type} value={value} onChange={(e) => onChange && onChange(e.target.value)} onClick={onClick} placeholder={placeholder} min={min} readOnly={readOnly} style={{ ...style, colorScheme: theme.name === "rave" ? "dark" : "light" }} />;
    }
    function Textarea({ value, onChange, placeholder, id, readOnly, onClick, style: extraStyle }) {
      const style = useInputStyle(); const theme = useTheme();
      return <textarea id={id} value={value} onChange={(e) => onChange && onChange(e.target.value)} onClick={onClick} readOnly={readOnly} placeholder={placeholder} style={{ ...style, minHeight: 60, resize: "vertical", fontFamily: theme.fontBody, ...extraStyle }} />;
    }
    function Select({ value, onChange, children }) {
      const style = useInputStyle(); const theme = useTheme();
      return <select value={value} onChange={(e) => onChange(e.target.value)} style={{ ...style, colorScheme: theme.name === "rave" ? "dark" : "light" }}>{children}</select>;
    }
    function Pill({ label, color, selected, onClick }) {
      const theme = useTheme();
      return (
        <button type="button" onClick={onClick} style={{ padding: "6px 12px", borderRadius: theme.radiusPill, border: `1px solid ${selected ? color : theme.border}`, background: selected ? (theme.name === "rave" ? color : `${color}18`) : theme.surface, color: selected ? (theme.name === "rave" ? "#FFFFFF" : color) : theme.inkMuted, fontSize: 12, fontWeight: selected ? theme.mediumWeight : 400, cursor: "pointer", fontFamily: theme.fontBody, display: "inline-flex", alignItems: "center", gap: 6, transition: "all 0.12s", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal" }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: selected && theme.name === "rave" ? "#FFFFFF" : color, opacity: selected ? 1 : 0.45 }} />
          {label}
        </button>
      );
    }
    function PriorityCheck({ checked, onChange }) {
      const theme = useTheme();
      return (
        <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: theme.ink, cursor: "pointer", paddingTop: 4, fontFamily: theme.fontBody }}>
          <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} style={{ width: 16, height: 16, cursor: "pointer", accentColor: theme.accent }} />
          <span style={{ textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal" }}>Star this race</span>
        </label>
      );
    }
    function ErrorBanner({ message }) {
      const theme = useTheme();
      return <div style={{ marginTop: 14, padding: "8px 12px", background: theme.errorBg, color: theme.errorText, borderRadius: theme.radiusSmall, fontSize: 12, fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontBody, fontStyle: theme.italicAccents ? "italic" : "normal", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal", border: theme.name === "rave" ? `1px solid ${theme.dangerBg}` : "none" }}>{message}</div>;
    }

    // =============================================================
    // Forms
    // =============================================================

    function RaceForm({ race, onSave, onCancel, onDelete }) {
      const [form, setForm] = useState(() => {
        if (!race) return { kind: "race", name: "", date: "", endDate: "", dateLabel: "", distance: "", types: [], status: "hopeful", location: "", notes: "", priority: false, optionGroup: "" };
        const { type, ...rest } = race;
        return { ...rest, kind: "race", types: Array.isArray(race.types) ? race.types : type ? [type] : [], endDate: race.endDate || "", dateLabel: race.dateLabel || "" };
      });
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [submitError, setSubmitError] = useState("");
      const isNew = !race?.id;
      function toggleType(key) { setForm((prev) => ({ ...prev, types: prev.types.includes(key) ? prev.types.filter((t) => t !== key) : [...prev.types, key] })); }
      function handleSubmit() {
        if (!form.name.trim() || !form.date) { setSubmitError("Name and date are required"); return; }
        setSubmitError(""); onSave({ ...form, id: form.id || `race-${Date.now()}` });
      }
      return (
        <FormShell title={isNew ? "Add a race" : "Edit race"} subtitle={isNew ? "whatever you've got — date, name, distance" : form.name} onCancel={onCancel}>
          <div style={{ display: "grid", gap: 14 }}>

    function ExportModal({ items, onClose }) {
      const theme = useTheme();

      async function copyJson() {

        }

      function downloadJson() {
        try {
          const blob = new Blob([json], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = "race-calendar.json"; a.style.display = "none";
          document.body.appendChild(a); a.click();
          setTimeout(() => { try { document.body.removeChild(a); URL.revokeObjectURL(url); } catch {} }, 200);
          setMsg("Download started"); setTimeout(() => setMsg(""), 2000);
        } catch { setMsg("Download blocked — use Copy instead"); setTimeout(() => setMsg(""), 3000); }
      }
      return (
        <FormShell title="Export your calendar" subtitle={`${items.length} item${items.length === 1 ? "" : "s"}`} onCancel={onClose} maxWidth={560}>

    function YearStrip({ items, year }) {
      const theme = useTheme();
      const yearItems = items.filter((i) => { const itemYear = getYear(i.date); const endYear = getYear(i.endDate || i.date); return itemYear === year || endYear === year; });
      const races = yearItems.filter(isRace); const events = yearItems.filter(isEvent);
      const conflicts = detectRaceConflicts(races);
      return (
        <div style={{ position: "relative", height: 68, background: theme.surface, borderRadius: theme.radius, marginBottom: 20, border: `${theme.cardBorderWidth}px solid ${theme.border}`, overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(12, 1fr)", height: "100%", position: "relative" }}>
            {MONTH_NAMES.map((m, i) => <div key={m} style={{ borderRight: i < 11 ? `1px solid ${theme.name === "rave" ? "#2A2A2A" : theme.border}` : "none", padding: "6px 0 0 7px", fontSize: 10, fontFamily: theme.fontMono, color: theme.inkMuted, fontWeight: theme.mediumWeight, letterSpacing: "0.05em" }}>{m.toUpperCase()}</div>)}
          </div>
          {events.map((e) => {
            const cat = EVENT_CATEGORIES[e.category] || EVENT_CATEGORIES.other;
            const startDay = getYear(e.date) < year ? 1 : dayOfYear(e.date);
            const endDay = getYear(e.endDate || e.date) > year ? 365 : dayOfYear(e.endDate || e.date);
            return <div key={e.id} title={`${e.name} · ${cat.label}`} style={{ position: "absolute", top: 22, left: `${(startDay - 1) / 365 * 100}%`, width: `${Math.max(endDay / 365 * 100 - (startDay - 1) / 365 * 100, 0.4)}%`, height: 26, background: cat.color, opacity: theme.name === "rave" ? 0.32 : 0.18, borderRadius: theme.radiusBadge, pointerEvents: "none" }} />;
          })}
          {conflicts.map((c, i) => {
            const a = dayOfYear(c.a.date) / 365 * 100; const b = dayOfYear(c.b.date) / 365 * 100;

    function headerBtnPrimary(theme) { return { padding: "8px 14px", background: theme.ink, color: theme.paper, border: "none", borderRadius: theme.radiusSmall, fontSize: 13, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }; }
    function headerBtnSecondary(theme) { return { padding: "8px 14px", background: "transparent", color: theme.ink, border: `1px solid ${theme.ink}`, borderRadius: theme.radiusSmall, fontSize: 13, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.06em" : "normal" }; }

    // =============================================================
    // Main app

    function RaceCalendar() {
      const [themeName, setThemeName] = useState("paper");
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editing, setEditing] = useState(null);
      const [addKind, setAddKind] = useState(null);
      const [yearFilter, setYearFilter] = useState("all");
      const [saveNote, setSaveNote] = useState("");
      const [menuOpen, setMenuOpen] = useState(false);
      const [clearConfirm, setClearConfirm] = useState(false);
      const [myShareId, setMyShareId] = useState(null);
      const [sharedViewId, setSharedViewId] = useState(null);
      const [showShareModal, setShowShareModal] = useState(false);
      const [showExportModal, setShowExportModal] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [loadError, setLoadError] = useState("");

      const theme = THEMES[themeName];
      const isSharedView = sharedViewId !== null;
      const isSharedNotFound = sharedViewId === "not-found";

      useEffect(() => {
        (async () => {
          // theme first (so loading state looks right)
          const savedTheme = localPrefs.getTheme();
          if (savedTheme && THEMES[savedTheme]) setThemeName(savedTheme);

          // URL shared view?
          const urlShareId = getShareIdFromURL();
          if (urlShareId) {
            try {
              const shared = await apiGetShare(urlShareId);
              if (shared) { setItems(shared.map(normalizeItem)); setSharedViewId(urlShareId); }
              else { setItems([]); setSharedViewId("not-found"); }
            } catch {
              setItems([]); setSharedViewId("not-found"); setLoadError("Couldn't reach the server");
            }
            setLoading(false); return;
          }

          // Personal
          try {
            const serverItems = await apiGetUser();
            setItems(serverItems.map(normalizeItem));
            const savedShareId = localPrefs.getShareId();
            if (savedShareId) setMyShareId(savedShareId);
          } catch {
            setLoadError("Couldn't reach the server — check your deployment");
          }
          setLoading(false);
        })();
      }, []);

      async function setTheme(name) { setThemeName(name); localPrefs.setTheme(name); }

      async function persist(newItems) {
        setItems(newItems);
        try {
          await apiSaveUser(newItems);
          if (myShareId) { try { await apiSaveShare(newItems, myShareId); } catch {} }
          setSaveNote("Saved"); setTimeout(() => setSaveNote(""), 1500);
        } catch {
          setSaveNote("Save failed — check connection"); setTimeout(() => setSaveNote(""), 3000);
        }
      }

      async function handleSave(item) {
        const normalized = normalizeItem(item);
        const existing = items.find((r) => r.id === normalized.id);
        const newItems = existing ? items.map((r) => (r.id === normalized.id ? normalized : r)) : [...items, normalized];
        await persist(newItems);
        setEditing(null); setAddKind(null);
      }
      async function handleDelete(id) { await persist(items.filter((r) => r.id !== id)); setEditing(null); }
      async function handleClearAll() { await persist([]); setMenuOpen(false); setClearConfirm(false); }

      function handleExport() { setShowExportModal(true); setMenuOpen(false); }
      function handleImport() { setShowImportModal(true); setMenuOpen(false); }
      async function handleImportData(text) {
        try {
          const data = JSON.parse(text);
          if (!Array.isArray(data)) return "Not a valid calendar — expected a JSON array";
          await persist(data.map(normalizeItem));
          setShowImportModal(false);
          setSaveNote(`Imported ${data.length} item${data.length === 1 ? "" : "s"}`);
          setTimeout(() => setSaveNote(""), 2000);
          return null;
        } catch { return "Couldn't parse that JSON"; }
      }

      async function handleShare() {
        if (items.length === 0) { setSaveNote("Add a race before sharing"); setTimeout(() => setSaveNote(""), 2000); return; }
        try {
          const shareId = await apiSaveShare(items, myShareId);
          setMyShareId(shareId); localPrefs.setShareId(shareId);
          setShowShareModal(true);
        } catch {
          setSaveNote("Couldn't create share link"); setTimeout(() => setSaveNote(""), 3000);
        }
      }
      async function handleStopSharing() {
        if (!myShareId) { setShowShareModal(false); return; }
        await apiDeleteShare(myShareId);
        setMyShareId(null); localPrefs.setShareId(null);
        setShowShareModal(false);
        setSaveNote("Link removed"); setTimeout(() => setSaveNote(""), 2000);
      }

      function handleExitSharedView() { clearURLHash(); window.location.reload(); }
      async function handleForkShared() {
        try { await apiSaveUser(items); } catch {}
        clearURLHash(); window.location.reload();
      }

      const filtered = items
        .filter((i) => { if (yearFilter === "all") return true; const yr = parseInt(yearFilter, 10); return getYear(i.date) === yr || getYear(i.endDate || i.date) === yr; })
        .sort((a, b) => a.date.localeCompare(b.date));
      const years = [...new Set(items.flatMap((i) => [getYear(i.date), getYear(i.endDate || i.date)]))].sort();
      const grouped = {};
      for (const i of filtered) {
        const y = getYear(i.date); const mk = monthKey(i.date);
        if (!grouped[y]) grouped[y] = {};
        if (!grouped[y][mk]) grouped[y][mk] = [];
        grouped[y][mk].push(i);
      }

      const races = items.filter(isRace);
      const stats = {
        total: races.length,
        marathons: races.filter((r) => raceTypes(r).includes("marathon")).length,
        confirmed: races.filter((r) => ["confirmed", "goal"].includes(r.status)).length,
        intl: races.filter((r) => { const loc = (r.location || "").toLowerCase(); return !loc.includes(", ny") && !loc.includes("nyc") && !loc.includes("manhattan") && !loc.includes("brooklyn") && !loc.includes("westchester") && !loc.includes("tbd") && loc.length > 0; }).length,
      };

      const raceConflicts = {}; const eventOverlaps = {};
      for (const y of years) {
        const yearItems = items.filter((i) => getYear(i.date) === y || getYear(i.endDate || i.date) === y);
        for (const c of detectRaceConflicts(yearItems)) raceConflicts[c.before] = c;
      }
      for (const c of detectEventOverlaps(items)) {
        if (!eventOverlaps[c.race.id]) eventOverlaps[c.race.id] = [];
        eventOverlaps[c.race.id].push(c);
      }

      const hasItems = items.length > 0;
      const showEmpty = !loading && (!hasItems || isSharedNotFound);

      if (loading) {
        return <div style={{ background: theme.paper, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: theme.fontBody, color: theme.inkMuted, fontSize: 14 }}>Loading your calendar…</div>;
      }

      return (
        <ThemeContext.Provider value={theme}>
          <div style={{ background: theme.paper, minHeight: "100vh", padding: "28px 24px 60px", fontFamily: theme.fontBody, color: theme.ink, position: "relative", backgroundImage: theme.backgroundPattern, backgroundSize: "6px 6px" }}>
            <div style={{ maxWidth: 820, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28, gap: 16, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 11, fontFamily: theme.fontMono, color: theme.inkMuted, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6 }}>Race Calendar</div>
                  <h1 style={{ fontFamily: theme.fontDisplay, fontSize: theme.name === "rave" ? 52 : 38, fontWeight: theme.displayWeight, lineHeight: 1.0, margin: 0, color: theme.ink, letterSpacing: theme.letterSpacingDisplay, textTransform: theme.uppercaseHeadings ? "uppercase" : "none" }}>
                    {theme.name === "rave" ? (<>The year of <span style={{ background: theme.accent, color: "#FFFFFF", padding: "0 12px", display: "inline-block" }}>running</span></>) : (<>The year of <em style={{ fontWeight: theme.displayWeight }}>running</em></>)}
                  </h1>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, position: "relative", flexWrap: "wrap" }}>
                  <ThemeToggle themeName={themeName} setTheme={setTheme} />
                  {saveNote && <span style={{ fontSize: 11, color: theme.inkMuted, fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontMono, fontStyle: theme.italicAccents ? "italic" : "normal", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.08em" : "normal" }}>{saveNote}</span>}
                  {!isSharedView && (
                    <>
                      <button onClick={() => { setAddKind("race"); setEditing(null); }} style={headerBtnPrimary(theme)}>+ Race</button>
                      <button onClick={() => { setAddKind("event"); setEditing(null); }} style={headerBtnSecondary(theme)}>+ Event</button>
                      <button onClick={handleShare} style={{ ...headerBtnSecondary(theme), background: myShareId ? (theme.name === "rave" ? theme.accent : `${theme.accent}18`) : "transparent", color: myShareId ? (theme.name === "rave" ? "#FFFFFF" : theme.accent) : theme.ink, borderColor: myShareId ? theme.accent : theme.ink }} title={myShareId ? "Manage your share link" : "Share this calendar"}>{myShareId ? "● Sharing" : "Share"}</button>
                      <button onClick={() => { setMenuOpen(!menuOpen); setClearConfirm(false); }} style={{ padding: "8px 10px", background: "transparent", color: theme.ink, border: `1px solid ${theme.border}`, borderRadius: theme.radiusSmall, fontSize: 13, fontWeight: theme.mediumWeight, cursor: "pointer", fontFamily: theme.fontBody, minWidth: 36 }}>⋯</button>
                      {menuOpen && (
                        <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: theme.radius, padding: 4, zIndex: 50, minWidth: 180, boxShadow: theme.name === "rave" ? "0 8px 24px rgba(0,0,0,0.5)" : "0 8px 24px rgba(28,25,23,0.08)" }}>
                          <button onClick={handleExport} style={menuBtn(theme)}>Export JSON</button>
                          <button onClick={handleImport} style={menuBtn(theme)}>Import JSON</button>
                          <div style={{ height: 1, background: theme.border, margin: "4px 0" }} />
                          {clearConfirm ? (
                            <>
                              <div style={{ padding: "6px 12px", fontSize: 11, color: theme.inkMuted, fontStyle: theme.italicAccents ? "italic" : "normal", fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontBody }}>Clear everything?</div>
                              <button onClick={handleClearAll} style={{ ...menuBtn(theme), color: theme.dangerBg, fontWeight: theme.mediumWeight }}>Yes, clear all</button>
                              <button onClick={() => setClearConfirm(false)} style={menuBtn(theme)}>Cancel</button>
                            </>
                          ) : (
                            <button onClick={() => setClearConfirm(true)} style={{ ...menuBtn(theme), color: theme.dangerBg }}>Clear all</button>
                          )}
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>

              {loadError && (
                <div style={{ marginBottom: 20, padding: "11px 14px", background: theme.errorBg, color: theme.errorText, borderRadius: theme.radius, fontSize: 13, fontFamily: theme.fontBody, border: theme.name === "rave" ? `1px solid ${theme.dangerBg}` : "none" }}>
                  {loadError}. Your API routes may not be deployed yet, or Vercel KV isn't linked. See README.
                </div>
              )}

              {isSharedView && !isSharedNotFound && <SharedBanner onExit={handleExitSharedView} onFork={handleForkShared} />}

              {showEmpty ? (
                <EmptyState onAddRace={() => { setAddKind("race"); setEditing(null); }} onAddEvent={() => { setAddKind("event"); setEditing(null); }} onImport={handleImport} sharedView={isSharedView && !isSharedNotFound} notFound={isSharedNotFound} />
              ) : (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 8, marginBottom: 22 }}>
                    <StatCard label="Total races" value={stats.total} />
                    <StatCard label="Marathons" value={stats.marathons} />
                    <StatCard label="Locked in" value={stats.confirmed} />
                    <StatCard label="Abroad" value={stats.intl} />
                  </div>
                  {years.length > 1 && (
                    <div style={{ display: "flex", gap: 4, marginBottom: 20, background: theme.surface, padding: 4, border: `1px solid ${theme.border}`, borderRadius: theme.radius, width: "fit-content", flexWrap: "wrap" }}>
                      <FilterTab active={yearFilter === "all"} onClick={() => setYearFilter("all")}>All years</FilterTab>
                      {years.map((y) => <FilterTab key={y} active={yearFilter === String(y)} onClick={() => setYearFilter(String(y))}>{y}</FilterTab>)}
                    </div>
                  )}
                  {Object.keys(grouped).sort().map((year) => {
                    const months = grouped[year];
                    const yearRaceCount = items.filter((i) => isRace(i) && getYear(i.date) === parseInt(year)).length;
                    const yearEventCount = items.filter((i) => isEvent(i) && (getYear(i.date) === parseInt(year) || getYear(i.endDate || i.date) === parseInt(year))).length;
                    return (
                      <div key={year} style={{ marginBottom: 32 }}>
                        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14, paddingBottom: 10, borderBottom: `1px solid ${theme.border}` }}>
                          <h2 style={{ fontFamily: theme.fontDisplay, fontSize: theme.name === "rave" ? 36 : 26, fontWeight: theme.displayWeight, margin: 0, color: theme.ink, letterSpacing: theme.letterSpacingDisplay, textTransform: theme.uppercaseHeadings ? "uppercase" : "none" }}>{year}</h2>
                          <span style={{ fontSize: 12, color: theme.inkMuted, fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontMono, fontStyle: theme.italicAccents ? "italic" : "normal", textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.08em" : "normal" }}>
                            {yearRaceCount} race{yearRaceCount === 1 ? "" : "s"}{yearEventCount > 0 && ` · ${yearEventCount} event${yearEventCount === 1 ? "" : "s"}`}
                          </span>
                        </div>
                        <YearStrip items={items} year={parseInt(year)} />
                        {Object.keys(months).sort().map((mk) => (
                          <div key={mk} style={{ marginBottom: 18 }}>
                            <div style={{ fontSize: 11, fontWeight: theme.mediumWeight, color: theme.inkMuted, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: theme.fontMono }}>{monthLabel(mk)}</div>
                            {months[mk].map((item) => (
                              <div key={item.id}>
                                {isEvent(item) ? <EventCard event={item} onEdit={setEditing} readOnly={isSharedView} /> : <RaceCard race={item} onEdit={setEditing} readOnly={isSharedView} />}
                                {raceConflicts[item.id] && <ConflictWarning conflict={raceConflicts[item.id]} />}
                                {eventOverlaps[item.id]?.map((c, i) => <EventConflictWarning key={i} conflict={c} />)}
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 40, paddingTop: 20, borderTop: `1px solid ${theme.border}`, fontSize: 12, color: theme.inkMuted, fontFamily: theme.italicAccents ? theme.fontDisplay : theme.fontMono, fontStyle: theme.italicAccents ? "italic" : "normal", textAlign: "center", lineHeight: 1.6, textTransform: theme.uppercaseHeadings ? "uppercase" : "none", letterSpacing: theme.uppercaseHeadings ? "0.05em" : "normal" }}>
                    {isSharedView ? "Read-only view. Copy this calendar to make it yours." : (<>Races are {theme.name === "rave" ? "dark blocks" : "white cards"}, events are warm blocks. Click anything to edit.<br />Tight windows between big races (≤14 days) and races overlapping events flag themselves.</>)}
                  </div>
                </>
              )}
            </div>

            {editing && !isSharedView && (isEvent(editing) ? <EventForm key={editing.id} event={editing} onSave={handleSave} onCancel={() => setEditing(null)} onDelete={handleDelete} /> : <RaceForm key={editing.id} race={editing} onSave={handleSave} onCancel={() => setEditing(null)} onDelete={handleDelete} />)}
            {addKind === "race" && !isSharedView && <RaceForm key="new-race" race={null} onSave={handleSave} onCancel={() => setAddKind(null)} />}
            {addKind === "event" && !isSharedView && <EventForm key="new-event" event={null} onSave={handleSave} onCancel={() => setAddKind(null)} />}
            {showShareModal && myShareId && <ShareModal shareId={myShareId} onClose={() => setShowShareModal(false)} onStopSharing={handleStopSharing} />}
            {showExportModal && <ExportModal items={items} onClose={() => setShowExportModal(false)} />}
            {showImportModal && <ImportModal onClose={() => setShowImportModal(false)} onImport={handleImportData} />}
          </div>
        </ThemeContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RaceCalendar />);
  </script>
</body>
</html>
